name: CI

# PR-only (économie de quota Actions) : le squash-merge reproduit à l'identique le head de PR
# déjà validé — re-tester sur push main doublait les minutes pour zéro information nouvelle.
# `workflow_dispatch` reste disponible pour relancer manuellement sur main si besoin.
on:
  pull_request:
    paths-ignore: ['docs/**', '**.md', 'RA-source/**']
  workflow_dispatch:

permissions:
  contents: read

# Un push qui en remplace un autre sur la même branche annule le run précédent
# (économie directe de minutes sur les itérations rapides).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (typecheck · lint · format · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        # npm install (et non npm ci) : le lockfile généré sous Windows n'inclut pas les
        # dépendances optionnelles Linux (@emnapi/* — fallback wasm de Tailwind/oxide).
        # npm install résout les bonnes deps par plateforme tout en respectant le lock.
        run: npm install --no-audit --no-fund

      - name: Audit (vulnérabilités npm, high+)
        # Garde-fou sécurité continu : échoue si une vulnérabilité high/critical apparaît
        # dans l'arbre de dépendances (les advisories low/moderate ne bloquent pas un PR).
        run: npm audit --audit-level=high

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test (avec coverage + plancher anti-régression)
        run: npm run test:coverage

      - name: Upload coverage (lcov)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: web/coverage/
          retention-days: 14

      - name: Build
        run: npm run build

      - name: Bundle budget (gzip)
        run: npm run budget

      - name: Headers de sécurité (_headers Cloudflare)
        run: npm run headers

  e2e:
    name: e2e (Playwright · offline PWA)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright browser
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: E2E (build + preview + tests)
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  rls:
    name: rls (pgTAP · isolation tenant)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase (stack local Docker)
        run: supabase start

      - name: RLS pgTAP (isolation multi-tenant)
        run: supabase test db

  lighthouse:
    name: lighthouse (perf · a11y)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        run: npm install --no-audit --no-fund

      - name: Build (mode local — sans secret, app accessible sans login)
        working-directory: web
        run: npm run build

      - name: Lighthouse CI (mesure perf/a11y, assertions non bloquantes)
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  edge:
    name: edge (deno · modules partagés)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # Politique de retry (transitoires only), circuit breaker, whitelist CORS : la logique
      # partagée des Edge Functions est testée en pur (sans réseau ni Supabase).
      - name: Tests modules partagés Edge
        run: deno test supabase/functions/_shared/

      - name: Type-check des Edge Functions
        run: deno check supabase/functions/regafy-ai/index.ts supabase/functions/translate/index.ts supabase/functions/upgrade/index.ts supabase/functions/share/index.ts

  secrets:
    name: secrets (gitleaks · historique complet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Tout l'historique : un secret commité puis « supprimé » reste exposé dans git.
          fetch-depth: 0

      # Binaire officiel via Docker (licence MIT, pas de clé requise — contrairement à
      # gitleaks-action qui exige une licence pour les organisations). --redact : ne jamais
      # afficher la valeur d'un secret détecté dans les logs CI.
      - name: Gitleaks (scan des secrets sur tout l'historique git)
        run: >
          docker run --rm -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:latest
          detect --source=/repo --redact --no-banner
