name: Deploy

# Déploiement automatique du front sur Cloudflare Pages.
# - push main → production (pharnos.pages.dev)
# ⚠️ No-op tant que le secret repo `CLOUDFLARE_API_TOKEN` n'est pas configuré (main reste vert).
# Secrets repo à poser pour activer : CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID,
# VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY (+ optionnel VITE_SENTRY_DSN).

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Garde-fou : on ne déploie que si le token Cloudflare est configuré (sans exposer le secret).
      - name: Check Cloudflare token
        id: guard
        run: echo "ready=${{ secrets.CLOUDFLARE_API_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        if: steps.guard.outputs.ready == 'true'
        working-directory: web
        run: npm install --no-audit --no-fund

      - name: Build (prod — clés publiques Supabase bakées)
        if: steps.guard.outputs.ready == 'true'
        working-directory: web
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.guard.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web
          command: pages deploy dist --project-name pharnos --branch ${{ github.ref_name }}
