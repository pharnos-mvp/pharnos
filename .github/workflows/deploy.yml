# Déploiement automatique du front sur Cloudflare Pages (push main → prod).
# Réactivé le 2026-06-13 : le repo est passé PUBLIC → minutes Actions illimitées (0 €), le
# quota n'est plus un frein. Secrets repo requis (présents) : CLOUDFLARE_API_TOKEN,
# CLOUDFLARE_ACCOUNT_ID, VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY (+ option VITE_SENTRY_DSN).
# Dépannage local : `npm run build` puis `npx wrangler pages deploy dist --project-name pharnos
# --branch main` (depuis web/) — TOUJOURS rebuild juste avant (les e2e reconstruisent dist sans env).
name: Deploy

on:
  push:
    branches: [main]
    paths-ignore: ['docs/**', '**.md', 'RA-source/**', 'load/**', 'supabase/tests/**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Garde-fou : on ne déploie que si le token Cloudflare est configuré (sans exposer le secret).
      - name: Check Cloudflare token
        id: guard
        run: echo "ready=${{ secrets.CLOUDFLARE_API_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        if: steps.guard.outputs.ready == 'true'
        working-directory: web
        run: npm install --no-audit --no-fund

      - name: Build (prod — clés publiques Supabase bakées)
        if: steps.guard.outputs.ready == 'true'
        working-directory: web
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          # Drapeau public (non secret) : affiche le bouton « Continuer avec Google ».
          # Le provider Google est activé côté Supabase (gate N — N1-a).
          VITE_GOOGLE_AUTH: 'true'
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.guard.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web
          command: pages deploy dist --project-name pharnos --branch ${{ github.ref_name }}
