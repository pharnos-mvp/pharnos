name: Deploy

# FALLBACK MANUEL uniquement. Le déploiement NOMINAL est l'intégration Git native de
# Cloudflare Pages (dashboard Cloudflare → Pages → pharnos → connecté au repo : build
# `npm run build`, output `web/dist`, vars VITE_* — voir docs/DEPLOY-CLOUDFLARE.md) :
# elle consomme les minutes de build Cloudflare (500/mois Free), pas le quota GitHub Actions
# (épuisé 06/2026 → ce workflow ne partait plus). Dépannage local : `npm run build` puis
# `npx wrangler pages deploy dist --project-name pharnos --branch main` (depuis web/).

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Garde-fou : on ne déploie que si le token Cloudflare est configuré (sans exposer le secret).
      - name: Check Cloudflare token
        id: guard
        run: echo "ready=${{ secrets.CLOUDFLARE_API_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        if: steps.guard.outputs.ready == 'true'
        working-directory: web
        run: npm install --no-audit --no-fund

      - name: Build (prod — clés publiques Supabase bakées)
        if: steps.guard.outputs.ready == 'true'
        working-directory: web
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.guard.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web
          command: pages deploy dist --project-name pharnos --branch ${{ github.ref_name }}
